server {
    listen 8080;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/weather; # Choose your folder
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }
}
